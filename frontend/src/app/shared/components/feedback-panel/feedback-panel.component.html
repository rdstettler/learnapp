<div class="feedback" [class.correct]="isCorrect" [class.incorrect]="!isCorrect" style="width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 15px; margin: 0 auto;">
  <div style="font-size: 1.2rem; white-space: pre-wrap;">
    <span>{{ isCorrect ? '✓' : '✗' }}</span>
    {{ message }}
  </div>
  <div class="flex flex-gap-10 jc-center">
    @if (showRetry) {
    <button (click)="onRetry.emit()" class="btn btn-secondary">
      Zurück
    </button>
    }
    @if (showNext) {
    <button (click)="onNext.emit()" class="btn btn-primary" [class.btn-secondary]="!isCorrect">
      Weiter
    </button>
    }
  </div>
</div>
